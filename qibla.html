<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الكهف - القبلة والمواقيت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        ::-webkit-scrollbar { display: none; }
        .modal-scroll::-webkit-scrollbar { display: block; height: 4px; }
        .modal-scroll::-webkit-scrollbar-track { background: transparent; }
        .modal-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .modal-scroll::-webkit-scrollbar-thumb { background: #475569; }
        
        /* تأثير البوصلة */
        .compass-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #f8fafc, #ccfbf1, #f8fafc);
            box-shadow: 0 10px 25px -5px rgba(20, 184, 166, 0.3), inset 0 4px 10px rgba(0,0,0,0.05);
            border: 4px solid #fff;
            transition: transform 0.1s ease-out;
        }
        .needle-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .kaaba-icon {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            color: #0f766e;
        }
    </style>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 pb-24 antialiased transition-colors duration-300">

    <!-- الترويسة الفيروزية -->
    <header class="bg-white dark:bg-slate-900 shadow-sm rounded-b-3xl mb-6 relative overflow-hidden text-center pt-6 pb-5 border-b border-teal-100 dark:border-slate-800">
        <div class="absolute top-0 right-0 w-32 h-32 bg-teal-50 dark:bg-teal-900/20 rounded-full mix-blend-multiply filter blur-2xl opacity-70 translate-x-10 -translate-y-10 pointer-events-none"></div>
        
        <button onclick="window.location.href='index.html'" class="absolute top-6 right-4 bg-teal-50 dark:bg-slate-800 hover:bg-teal-100 text-teal-700 dark:text-teal-400 w-10 h-10 rounded-full flex items-center justify-center text-lg transition shadow-sm z-20 active:scale-95">
            <i class="fa-solid fa-arrow-right"></i>
        </button>

        <div class="relative z-10 w-16 h-16 mx-auto bg-teal-100 dark:bg-teal-900/40 text-teal-600 dark:text-teal-400 rounded-full flex items-center justify-center text-3xl shadow-inner mb-2 border border-teal-200 dark:border-teal-800">
            <i class="fa-solid fa-compass"></i>
        </div>
        <h1 class="text-xl font-extrabold text-teal-800 dark:text-teal-300 mb-1 relative z-10">القبلة والمواقيت</h1>
        <p class="text-[10px] text-teal-600 dark:text-teal-500 font-bold">دليلك الروحي اليومي</p>
    </header>

    <main class="max-w-md mx-auto px-5 space-y-6">

        <!-- القسم الأول: اتجاه القبلة -->
        <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-md border border-teal-50 dark:border-slate-700 text-center relative overflow-hidden">
            <h2 class="text-lg font-bold text-teal-800 dark:text-teal-300 mb-2"><i class="fa-solid fa-kaaba text-teal-500 ml-1"></i> اتجاه القبلة</h2>
            <p class="text-[11px] text-gray-500 dark:text-gray-400 mb-5 leading-relaxed">
                القبلة هي وجهة قلوبنا. في لبنان، تقع الكعبة المشرفة تقريباً على زاوية <span class="font-bold text-teal-600 dark:text-teal-400">155 درجة</span> (الجنوب الشرقي).
            </p>

            <div class="compass-container dark:border-slate-700 dark:bg-slate-800 mb-5">
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="w-4 h-4 bg-teal-500 rounded-full z-10 shadow-sm border-2 border-white"></div>
                </div>
                <div id="compassNeedle" class="needle-container">
                    <i class="fa-solid fa-kaaba kaaba-icon"></i>
                    <div class="absolute top-10 bottom-10 left-1/2 w-0.5 bg-gradient-to-b from-teal-500 to-transparent -translate-x-1/2"></div>
                </div>
            </div>

            <button id="startCompassBtn" onclick="startCompass()" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-3 rounded-xl transition shadow-lg flex justify-center items-center gap-2 active:scale-95">
                تحديد القبلة الآن <i class="fa-solid fa-location-arrow"></i>
            </button>
            <p id="compassError" class="text-[10px] text-rose-500 mt-3 hidden font-bold"></p>
        </div>

        <!-- القسم الثاني: مواقيت الصلاة مع محوّل المناطق -->
        <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-md border border-teal-50 dark:border-slate-700 relative">
            
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-base font-bold text-teal-800 dark:text-teal-300"><i class="fa-regular fa-clock text-teal-500 ml-1"></i> مواقيت الصلاة</h2>
                <span id="currentDate" class="text-[10px] bg-teal-50 dark:bg-slate-700 text-teal-600 dark:text-teal-400 font-bold px-2 py-1 rounded-lg"></span>
            </div>

            <!-- أزرار المناطق (Tabs) -->
            <div class="flex overflow-x-auto gap-2 mb-4 pb-2 modal-scroll" id="cityTabs">
                <button onclick="changeCity('Beirut', this)" class="city-btn bg-teal-600 text-white px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow-sm active:scale-95 whitespace-nowrap">بيروت</button>
                <button onclick="changeCity('Nabatiyeh', this)" class="city-btn bg-white dark:bg-slate-800 text-gray-600 dark:text-gray-300 border border-teal-100 dark:border-slate-700 px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow-sm active:scale-95 whitespace-nowrap">النبطية وصور</button>
                <button onclick="changeCity('Baalbek', this)" class="city-btn bg-white dark:bg-slate-800 text-gray-600 dark:text-gray-300 border border-teal-100 dark:border-slate-700 px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow-sm active:scale-95 whitespace-nowrap">بعلبك</button>
                <button onclick="changeCity('Hermel', this)" class="city-btn bg-white dark:bg-slate-800 text-gray-600 dark:text-gray-300 border border-teal-100 dark:border-slate-700 px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow-sm active:scale-95 whitespace-nowrap">الهرمل</button>
                <button onclick="changeCity('Tripoli', this)" class="city-btn bg-white dark:bg-slate-800 text-gray-600 dark:text-gray-300 border border-teal-100 dark:border-slate-700 px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow-sm active:scale-95 whitespace-nowrap">طرابلس</button>
            </div>

            <!-- أوقات الصلاة -->
            <div class="space-y-3" id="prayerTimesContainer">
                <div class="text-center text-teal-600 text-xs py-4"><i class="fa-solid fa-spinner fa-spin text-lg mb-2"></i><br>جاري الحساب...</div>
            </div>
            
            <p class="text-[9px] text-gray-400 text-center mt-4 leading-relaxed">* المواقيت محسوبة فلكياً وفق طريقة مؤسسة لواء (قم) وتتطابق مع المعايير الجعفرية اللبنانية.</p>
        </div>

    </main>

    <div id="footernav"></div>
    <script src="script.js"></script>

    <script>
        // ==========================================
        // 1. دوال رياضية لحساب مواقيت (تقويم الصايغ)
        // ==========================================
        function parseTimeStr(timeStr) {
            let [hours, minutes] = timeStr.split(':');
            return parseInt(hours) * 60 + parseInt(minutes);
        }

        function formatMinutesTo12H(totalMinutes) {
            let hours = Math.floor(totalMinutes / 60) % 24;
            let minutes = totalMinutes % 60;
            const ampm = hours >= 12 ? 'م' : 'ص';
            let displayHours = hours % 12;
            displayHours = displayHours ? displayHours : 12;
            let displayMinutes = minutes < 10 ? '0' + minutes : minutes;
            return `${displayHours}:${displayMinutes} ${ampm}`;
        }

        // ==========================================
        // 2. جلب مواقيت الصلاة الديناميكي
        // ==========================================
        document.addEventListener("DOMContentLoaded", () => {
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' };
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ar-EG', dateOptions);
            fetchPrayerTimes('Beirut'); 
        });

        window.changeCity = function(cityCode, btnElement) {
            document.querySelectorAll('.city-btn').forEach(btn => {
                btn.className = "city-btn bg-white dark:bg-slate-800 text-gray-600 dark:text-gray-300 border border-teal-100 dark:border-slate-700 px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow-sm active:scale-95 whitespace-nowrap";
            });
            btnElement.className = "city-btn bg-teal-600 text-white px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow-sm active:scale-95 whitespace-nowrap";
            fetchPrayerTimes(cityCode);
        };

        function fetchPrayerTimes(city) {
            const container = document.getElementById('prayerTimesContainer');
            container.innerHTML = '<div class="text-center text-teal-600 text-xs py-4"><i class="fa-solid fa-spinner fa-spin text-lg mb-2"></i><br>جاري الحساب الدقيق...</div>';

            fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Lebanon&method=0`)
                .then(response => response.json())
                .then(data => {
                    const timings = data.data.timings;
                    
                    let fajrMins = parseTimeStr(timings.Fajr);
                    let sunsetMins = parseTimeStr(timings.Sunset);
                    
                    let imsakMins = fajrMins - 12;
                    let fajrNextDay = fajrMins + (24 * 60); 
                    let diffSunsetToFajr = fajrNextDay - sunsetMins;
                    let midnightMins = sunsetMins + Math.floor(diffSunsetToFajr / 2);

                    const timesArr = [
                        { name: "الإمساك", time: formatMinutesTo12H(imsakMins), icon: "fa-cloud-moon", isBold: false },
                        { name: "الفجر", time: formatMinutesTo12H(fajrMins), icon: "fa-cloud-sun", isBold: true },
                        { name: "الشروق", time: formatMinutesTo12H(parseTimeStr(timings.Sunrise)), icon: "fa-sun", isBold: false },
                        { name: "الظهر", time: formatMinutesTo12H(parseTimeStr(timings.Dhuhr)), icon: "fa-sun", isBold: true },
                        { name: "المغرب", time: formatMinutesTo12H(parseTimeStr(timings.Maghrib)), icon: "fa-moon", isBold: true },
                        { name: "منتصف الليل", time: formatMinutesTo12H(midnightMins), icon: "fa-star-and-crescent", isBold: false }
                    ];

                    container.innerHTML = ''; 
                    timesArr.forEach(t => {
                        const isHighlight = t.isBold ? "bg-teal-50 dark:bg-teal-900/20 border-teal-100 dark:border-teal-800" : "bg-gray-50 dark:bg-slate-700/50 border-gray-100 dark:border-slate-700";
                        const textColor = t.isBold ? "text-teal-800 dark:text-teal-300 font-bold" : "text-gray-600 dark:text-gray-300";
                        const timeColor = t.isBold ? "text-teal-600 dark:text-teal-400 font-bold" : "text-gray-500 dark:text-gray-400 font-medium";

                        container.innerHTML += `
                            <div class="flex justify-between items-center p-3 rounded-xl border ${isHighlight}">
                                <div class="flex items-center gap-3">
                                    <i class="fa-solid ${t.icon} text-teal-400/70 dark:text-teal-600"></i>
                                    <span class="text-xs ${textColor}">${t.name}</span>
                                </div>
                                <span class="text-sm ${timeColor} tracking-wide" dir="ltr">${t.time}</span>
                            </div>
                        `;
                    });
                })
                .catch(error => {
                    container.innerHTML = '<p class="text-center text-rose-500 text-xs py-4">تعذر جلب المواقيت، يرجى التحقق من الاتصال بالإنترنت.</p>';
                });
        }

        // ==========================================
        // ==========================================
        // 3. اتجاه القبلة (البوصلة التفاعلية) - نسخة تجربة المستخدم (UX) الفخمة
        // ==========================================
        function startCompass() {
            const btn = document.getElementById('startCompassBtn');
            const errorText = document.getElementById('compassError');
            const needle = document.getElementById('compassNeedle');
            const QIBLA_BEARING = 155.4; 

            // إعطاء تفاعل بصري يثبت أن الزر تم النقر عليه
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الاتصال بالبوصلة...';
            errorText.classList.add('hidden');

            // فحص أجهزة الآيفون (iOS 13+)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation, true);
                            btn.classList.add('hidden');
                            errorText.classList.add('hidden');
                        } else {
                            // إذا اليوزر رفض أو الآيفون قفلها تلقائياً
                            showIosInstructions(errorText, btn);
                        }
                    })
                    .catch(err => {
                        // في حال الخطأ أو منع المتصفح
                        showIosInstructions(errorText, btn);
                    });
            } else {
                // للأندرويد والأجهزة الأخرى (تعمل تلقائياً عادةً بدون Pop-up)
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
                window.addEventListener('deviceorientation', handleOrientation, true);
                btn.classList.add('hidden');
                errorText.classList.add('hidden');
                
                // فحص إذا لم تتحرك الإبرة (للتأكد أن حساسات الأندرويد تعمل)
                setTimeout(() => {
                    if (!needle.style.transform || needle.style.transform === '') {
                        errorText.innerHTML = `
                            <div class="bg-amber-50 border border-amber-200 p-3 rounded-xl text-right mt-2 text-gray-700">
                                <span class="font-bold text-amber-600 text-xs mb-1 block"><i class="fa-solid fa-triangle-exclamation"></i> البوصلة اليدوية تحتاج تنشيط</span>
                                <span class="text-[10px] leading-relaxed block mt-1">
                                    يبدو أن حساسات الهاتف لا تستجيب. يرجى <strong>تفعيل الموقع (GPS)</strong>، وتدوير الهاتف بيدك على شكل رقم (8) لتنشيط البوصلة، ثم المحاولة.
                                </span>
                            </div>`;
                        errorText.classList.remove('hidden');
                        btn.classList.remove('hidden');
                        btn.innerHTML = 'إعادة المحاولة <i class="fa-solid fa-rotate-right"></i>';
                    }
                }, 2500);
            }

            function handleOrientation(event) {
                let compassHeading;
                if (event.webkitCompassHeading) {
                    compassHeading = event.webkitCompassHeading; // للآيفون
                } else if (event.alpha !== null) {
                    compassHeading = Math.abs(event.alpha - 360); // للأندرويد
                }

                if (compassHeading !== undefined && compassHeading !== null) {
                    let qiblaRotation = QIBLA_BEARING - compassHeading;
                    needle.style.transform = `rotate(${qiblaRotation}deg)`;
                }
            }
        }

        // دالة لعرض رسالة تعليمات أنيقة جداً لليوزر بدل رسالة الخطأ الجافة
        function showIosInstructions(errorText, btn) {
            errorText.innerHTML = `
                <div class="bg-rose-50 border border-rose-200 p-3 rounded-xl text-right mt-2 text-gray-700 shadow-sm">
                    <span class="font-bold text-rose-600 text-xs mb-1 block"><i class="fa-solid fa-lock"></i> البوصلة مقفلة من الآيفون!</span>
                    <span class="text-[10px] leading-relaxed block mt-1">
                        أبل تمنع البوصلة افتراضياً. لتشغيلها بثوانٍ:
                        <br><br>
                        1. اذهب إلى <strong>إعدادات الهاتف (Settings)</strong><br>
                        2. انزل واضغط على متصفح <strong>سفاري (Safari)</strong><br>
                        3. انزل للأسفل وفعّل خيار <strong>(الوصول إلى الحركة والاتجاه)</strong><br>
                        <span class="text-rose-500 font-bold text-[9px] mt-1 block">*أو (Motion & Orientation Access) بالإنجليزية.</span>
                    </span>
                </div>
            `;
            errorText.classList.remove('hidden');
            btn.innerHTML = 'تحديث والمحاولة مجدداً <i class="fa-solid fa-rotate-right"></i>';
            btn.onclick = () => window.location.reload(); // تغيير وظيفة الزر ليعمل Refresh بعد ما اليوزر يضبط الإعدادات
        }
   </script>
</body>
</html>
